<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SendFlow</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0e1621);
      --text: var(--tg-theme-text-color, #f5f5f5);
      --hint: var(--tg-theme-hint-color, #8e9ba7);
      --accent: #0088cc;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    .balance {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    .hint {
      text-align: center;
      color: var(--hint);
      font-size: 0.9rem;
      padding: 0 1rem 1.5rem;
    }
    .send-btn {
      display: block;
      width: calc(100% - 2rem);
      margin: 0 auto 1rem;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
    }
    #transactions {
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--hint);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="balance" id="balance">— USDC</div>
  <p class="hint">Portfolio &amp; send — tied to your Telegram ID. Full history in the bot with <code>history</code>.</p>
  <button type="button" class="send-btn" onclick="openSendWizard()">💸 Send USDC</button>
  <div id="transactions"></div>
  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }
    const uid = tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "demo";
    fetch("/api/balance?userId=" + encodeURIComponent(uid))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var el = document.getElementById("balance");
        if (el) el.textContent = (d.balance != null ? d.balance : "0") + " USDC";
      })
      .catch(function () {
        var el = document.getElementById("balance");
        if (el) el.textContent = "Open in Telegram";
      });
    function openSendWizard() {
      if (tg) tg.sendData(JSON.stringify({ action: "open_send" }));
      else alert("Open this app from the SendFlow Telegram bot.");
    }
  </script>
</body>
</html>
